# Slick API — nginx como front de PHP-FPM (contenedor no-root, puerto 8080).

# Sin "user": el proceso ya corre como www-data.
pid /run/nginx/nginx.pid;
worker_processes auto;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logs de acceso a stdout → Docker/Dokploy.
    access_log /dev/stdout;

    # Rutas temporales escribibles por www-data (contenedor no-root).
    client_body_temp_path /var/lib/nginx/tmp/client_body;
    proxy_temp_path       /var/lib/nginx/tmp/proxy;
    fastcgi_temp_path     /var/lib/nginx/tmp/fastcgi;
    uwsgi_temp_path       /var/lib/nginx/tmp/uwsgi;
    scgi_temp_path        /var/lib/nginx/tmp/scgi;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # La API responde JSON: comprimirlo ahorra ancho de banda real.
    gzip on;
    gzip_types application/json application/vnd.api+json text/plain;
    gzip_min_length 256;

    client_max_body_size 10m;

    server {
        listen 8080;
        server_name _;

        root /var/www/html/public;
        index index.php;

        # Cabeceras de seguridad básicas para una API.
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        # Front controller de Laravel.
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /index.php {
            fastcgi_pass unix:/run/php/fpm.sock;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_read_timeout 60s;
        }

        # Solo index.php ejecuta PHP; cualquier otro .php se rechaza
        # (defensa contra subida/ejecución de scripts arbitrarios).
        location ~ \.php$ {
            return 404;
        }

        # Nunca servir dotfiles (.env nunca llega a la imagen, pero por capas).
        location ~ /\. {
            deny all;
        }
    }
}
