; Slick API — pool de PHP-FPM
; Socket unix (más rápido que TCP loopback) compartido con nginx.

[global]
; Logs del master a stderr (los recoge Docker); sin daemonizar (supervisord).
error_log = /dev/stderr
daemonize = no

[www]
listen = /run/php/fpm.sock
listen.mode = 0660

; El contenedor corre como www-data; no se puede cambiar de usuario (no-root),
; así que no se declaran user/group.

; Dimensionado para un VPS pequeño-mediano. Con memory_limit=256M, 10 workers
; topan en ~2.5 GB en el peor caso teórico (en la práctica mucho menos).
pm = dynamic
pm.max_children = 10
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 4
; Recicla workers cada N peticiones (previene fugas de memoria acumuladas).
pm.max_requests = 500

; Diagnóstico: registra peticiones que tarden más de 5s.
slowlog = /dev/stderr
request_slowlog_timeout = 5s

; Los echo/warnings de PHP van al log del worker.
catch_workers_output = yes
decorate_workers_output = no

; Endpoint de estado interno para el healthcheck de FPM si hiciera falta.
pm.status_path = /fpm-status
