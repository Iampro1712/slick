; Slick API — overrides de producción (sobre php.ini-production)

; --- OPcache: el código no cambia dentro del contenedor, así que se compila
; --- una vez y nunca se revalida contra disco (validate_timestamps=0).
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
; JIT en modo tracing: acelera el trabajo CPU-bound (fechas, colecciones).
opcache.jit = tracing
opcache.jit_buffer_size = 64M

; --- Runtime
memory_limit = 256M
max_execution_time = 60
upload_max_filesize = 10M
post_max_size = 10M

; --- Seguridad / higiene
expose_php = Off
display_errors = Off
log_errors = On
; Los logs van a stderr → los recoge Docker/Dokploy.
error_log = /dev/stderr

; --- Sesiones no se usan (API stateless con Sanctum), pero por si acaso:
session.use_strict_mode = 1

; --- Zona horaria por defecto del proceso (la app usa config/agenda.php)
date.timezone = UTC
